<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ByteBank — Criar Conta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@200;300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #020810;
      --cyan:      #00d4ff;
      --cyan-dim:  #007a99;
      --panel:     #040e1a;
      --border:    rgba(0,212,255,0.18);
      --text:      #d8f0ff;
      --muted:     #3a6a88;
      --error:     #ff4d6a;
      --success:   #00ffaa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 36px 20px;
    }

    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 50% 50% at 20% 30%, rgba(0,100,180,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 70%, rgba(0,60,120,0.06) 0%, transparent 60%);
    }

    .card {
      width: 100%; max-width: 480px;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 46px 42px 42px;
      position: relative;
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
      box-shadow: 0 0 60px rgba(0,212,255,0.05);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card .c { position: absolute; width: 16px; height: 16px; border-color: var(--cyan); border-style: solid; }
    .card .c.tl { top:-1px; left:-1px;   border-width: 2px 0 0 2px; }
    .card .c.tr { top:-1px; right:-1px;  border-width: 2px 2px 0 0; }
    .card .c.br { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }
    .card .c.bl { bottom:-1px; left:-1px;  border-width: 0 0 2px 2px; }

    .card::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      box-shadow: 0 0 10px var(--cyan);
    }

    /* Logo */
    .logo-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 38px; text-decoration: none; transition: opacity 0.2s; }
    .logo-wrap:hover { opacity: 0.82; }
    .logo-svg  { width: 46px; height: 46px; flex-shrink: 0; }
    .logo-name {
      font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase; color: #ffffff;
    }
    .logo-name em { color: var(--cyan); font-style: normal; }
    .logo-sub  { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 0.22em; color: var(--muted); margin-top: 3px; text-transform: uppercase; }

    h1 { font-family: 'Rajdhani', sans-serif; font-size: 27px; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 4px; }
    .subtitle { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 30px; }

    .flash { padding: 10px 14px; font-size: 12px; margin-bottom: 18px; border-left: 2px solid; font-family: 'Share Tech Mono', monospace; }
    .flash.error   { background: rgba(255,77,106,0.08); color: var(--error);   border-color: var(--error); }
    .flash.success { background: rgba(0,255,170,0.07);  color: var(--success); border-color: var(--success); }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .field { margin-bottom: 20px; }

    label {
      display: block; font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 7px;
    }

    input {
      width: 100%; background: rgba(0,20,40,0.55); border: 1px solid rgba(0,212,255,0.14);
      color: var(--text); padding: 11px 14px;
      font-family: 'Exo 2', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 0.02em;
    }
    input:focus { border-color: var(--cyan-dim); box-shadow: 0 0 14px rgba(0,212,255,0.12); }
    input::placeholder { color: #1e4a62; font-size: 13px; }

    .btn {
      width: 100%; padding: 13px; background: transparent;
      border: 1px solid var(--cyan); color: var(--cyan);
      font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
      position: relative; overflow: hidden; transition: color 0.28s, box-shadow 0.28s;
      margin-top: 8px;
    }
    .btn::before {
      content: ''; position: absolute; inset: 0; background: var(--cyan);
      transform: translateX(-102%); transition: transform 0.32s cubic-bezier(0.16,1,0.3,1); z-index: 0;
    }
    .btn:hover { color: #000; box-shadow: 0 0 28px rgba(0,212,255,0.3); }
    .btn:hover::before { transform: translateX(0); }
    .btn span { position: relative; z-index: 1; }

    .footer-link { margin-top: 22px; text-align: center; font-size: 12px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }
    .footer-link a { color: var(--cyan); text-decoration: none; }
    .footer-link a:hover { text-shadow: 0 0 10px var(--cyan); }

    @media (max-width: 480px) { .card { padding: 36px 24px 32px; } .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="card">
    <span class="c tl"></span><span class="c tr"></span>
    <span class="c br"></span><span class="c bl"></span>

    <a href="/home" class="logo-wrap">
      <svg class="logo-svg" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="g"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
        </defs>
        <rect x="1" y="1" width="48" height="48" rx="7" fill="#020c18" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
        <rect x="10" y="12" width="30" height="26" rx="2" fill="#00d4ff" opacity="0.04" filter="url(#g2)"/>
        <line x1="1" y1="25" x2="10" y2="25" stroke="#00d4ff" stroke-width="0.7" opacity="0.45"/>
        <line x1="40" y1="25" x2="49" y2="25" stroke="#00d4ff" stroke-width="0.7" opacity="0.45"/>
        <line x1="25" y1="1" x2="25" y2="10" stroke="#00d4ff" stroke-width="0.7" opacity="0.45"/>
        <line x1="25" y1="40" x2="25" y2="49" stroke="#00d4ff" stroke-width="0.7" opacity="0.45"/>
        <rect x="5" y="5" width="5" height="5" rx="1" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.35"/>
        <rect x="40" y="5" width="5" height="5" rx="1" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.35"/>
        <rect x="5" y="40" width="5" height="5" rx="1" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.35"/>
        <rect x="40" y="40" width="5" height="5" rx="1" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.35"/>
        <text x="25" y="32" text-anchor="middle" font-family="Rajdhani, sans-serif" font-size="19" font-weight="700" fill="#00d4ff" opacity="0.22" filter="url(#g2)">BB</text>
        <text x="25" y="32" text-anchor="middle" font-family="Rajdhani, sans-serif" font-size="19" font-weight="700" fill="#00d4ff" filter="url(#g)">BB</text>
      </svg>
      <div>
        <div class="logo-name"><em>Byte</em>Bank</div>
        <div class="logo-sub">Secure Digital Banking</div>
      </div>
    </div>

    <h1>Criar nova conta</h1>
    <p class="subtitle">&gt; inicializando_cadastro</p>

    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}

    <form method="POST" action="/register">
      <div class="field">
        <label>Nome completo</label>
        <input type="text" name="name" placeholder="João Silva" required autofocus/>
      </div>

      <div class="row">
        <div class="field">
          <label>CPF</label>
          <input type="text" name="cpf" placeholder="000.000.000-00" required/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="joao@email.com" required/>
        </div>
      </div>

      <div class="field">
        <label>Senha</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>

      <button type="submit" class="btn"><span>Criar conta</span></button>
    </form>

    <p class="footer-link">
      Já tem acesso? <a href="/login">// Fazer login</a>
    </p>
  </div>
</body>
</html>
