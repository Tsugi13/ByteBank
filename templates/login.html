<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ByteBank — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@200;300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #000;
      --cyan:      #00d4ff;
      --cyan-dim:  #007a99;
      --cyan-glow: rgba(0,212,255,0.25);
      --panel:     rgba(4, 12, 20, 0.88);
      --border:    rgba(0,212,255,0.22);
      --text:      #d8f0ff;
      --muted:     #3a6a88;
      --error:     #ff4d6a;
      --success:   #00ffaa;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: var(--text); font-family: 'Exo 2', sans-serif; }

    #bg { position: fixed; inset: 0; z-index: 0; }

    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    }

    .vignette {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(0,0,0,0.7) 100%);
    }

    .page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 430px;
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 46px 42px 42px;
      position: relative;
      box-shadow: 0 0 80px rgba(0,212,255,0.08), inset 0 0 60px rgba(0,212,255,0.02);
      animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Animated corner brackets */
    .card .c { position: absolute; width: 18px; height: 18px; border-color: var(--cyan); border-style: solid; }
    .card .c.tl { top:-1px; left:-1px;   border-width: 2px 0 0 2px; }
    .card .c.tr { top:-1px; right:-1px;  border-width: 2px 2px 0 0; }
    .card .c.br { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }
    .card .c.bl { bottom:-1px; left:-1px;  border-width: 0 0 2px 2px; }

    /* Top glow bar */
    .card::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      box-shadow: 0 0 12px var(--cyan);
    }

    /* ── Logo ── */
    .logo-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 38px; text-decoration: none; transition: opacity 0.2s; }
    .logo-wrap:hover { opacity: 0.82; }

    .logo-svg { width: 50px; height: 50px; flex-shrink: 0; }

    .logo-text { line-height: 1; }
    .logo-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: #ffffff;
    }
    .logo-name em { color: var(--cyan); font-style: normal; }
    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 0.25em; color: var(--muted);
      margin-top: 3px; text-transform: uppercase;
    }

    /* ── Headings ── */
    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px; font-weight: 600; letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 0.08em; color: var(--muted);
      margin-bottom: 30px;
    }

    /* ── Flash ── */
    .flash {
      padding: 10px 14px; font-size: 12px; margin-bottom: 20px;
      border-left: 2px solid; font-family: 'Share Tech Mono', monospace; letter-spacing: 0.04em;
    }
    .flash.error   { background: rgba(255,77,106,0.08); color: var(--error);   border-color: var(--error); }
    .flash.success { background: rgba(0,255,170,0.07);  color: var(--success); border-color: var(--success); }

    /* ── Form ── */
    label {
      display: block; font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 7px;
    }

    input {
      width: 100%; background: rgba(0,20,40,0.55); border: 1px solid rgba(0,212,255,0.15);
      color: var(--text); padding: 12px 14px;
      font-family: 'Exo 2', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 22px; letter-spacing: 0.03em;
    }
    input:focus { border-color: var(--cyan-dim); box-shadow: 0 0 16px rgba(0,212,255,0.15); }
    input::placeholder { color: #1e4a62; font-size: 13px; }

    /* ── Btn ── */
    .btn {
      width: 100%; padding: 13px; background: transparent;
      border: 1px solid var(--cyan); color: var(--cyan);
      font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
      position: relative; overflow: hidden; transition: color 0.28s, box-shadow 0.28s;
      margin-top: 4px;
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--cyan); transform: translateX(-102%);
      transition: transform 0.32s cubic-bezier(0.16,1,0.3,1); z-index: 0;
    }
    .btn:hover { color: #000; box-shadow: 0 0 28px rgba(0,212,255,0.35); }
    .btn:hover::before { transform: translateX(0); }
    .btn span { position: relative; z-index: 1; }

    .footer-link {
      margin-top: 22px; text-align: center;
      font-size: 12px; color: var(--muted); font-family: 'Share Tech Mono', monospace;
    }
    .footer-link a { color: var(--cyan); text-decoration: none; transition: text-shadow 0.2s; }
    .footer-link a:hover { text-shadow: 0 0 10px var(--cyan); }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <div class="page">
    <div class="card">
      <span class="c tl"></span><span class="c tr"></span>
      <span class="c br"></span><span class="c bl"></span>

      <!-- SVG Logo -->
      <a href="/home" class="logo-wrap">
        <svg class="logo-svg" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="g"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
          </defs>
          <!-- Base plate -->
          <rect x="1" y="1" width="48" height="48" rx="7" fill="#020c18" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
          <!-- Glow behind text -->
          <rect x="10" y="12" width="30" height="26" rx="2" fill="#00d4ff" opacity="0.04" filter="url(#g2)"/>
          <!-- Circuit traces H -->
          <line x1="1"  y1="25" x2="10" y2="25" stroke="#00d4ff" stroke-width="0.7" opacity="0.45"/>
          <line x1="40" y1="25" x2="49" y2="25" stroke="#00d4ff" stroke-width="0.7" opacity="0.45"/>
          <!-- Circuit traces V -->
          <line x1="25" y1="1"  x2="25" y2="10" stroke="#00d4ff" stroke-width="0.7" opacity="0.45"/>
          <line x1="25" y1="40" x2="25" y2="49" stroke="#00d4ff" stroke-width="0.7" opacity="0.45"/>
          <!-- Corner pads -->
          <rect x="5"  y="5"  width="5" height="5" rx="1" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.35"/>
          <rect x="40" y="5"  width="5" height="5" rx="1" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.35"/>
          <rect x="5"  y="40" width="5" height="5" rx="1" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.35"/>
          <rect x="40" y="40" width="5" height="5" rx="1" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.35"/>
          <!-- BB text glow -->
          <text x="25" y="32" text-anchor="middle" font-family="Rajdhani, sans-serif" font-size="19" font-weight="700" fill="#00d4ff" opacity="0.25" filter="url(#g2)">BB</text>
          <!-- BB text crisp -->
          <text x="25" y="32" text-anchor="middle" font-family="Rajdhani, sans-serif" font-size="19" font-weight="700" fill="#00d4ff" filter="url(#g)">BB</text>
        </svg>
        <div class="logo-text">
          <div class="logo-name"><em>Byte</em>Bank</div>
          <div class="logo-sub">Secure Digital Banking</div>
        </div>
      </a>

      <h1>Acesse sua conta</h1>
      <p class="subtitle">&gt; autenticação_requerida</p>

      {% for category, message in get_flashed_messages(with_categories=true) %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}

      <form method="POST" action="/login">
        <label>Identificação</label>
        <input type="text" name="name" placeholder="Nome completo" required autofocus/>

        <label>Senha de acesso</label>
        <input type="password" name="password" placeholder="••••••••" required/>

        <button type="submit" class="btn"><span>Entrar no sistema</span></button>
      </form>

      <p class="footer-link">
        Sem conta? <a href="/register">// Criar acesso</a>
      </p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H, nodes, edges, pulses = [], t = 0;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      buildGraph();
    }

    function buildGraph() {
      nodes = [];
      const gx = 85, gy = 85;
      const cols = Math.ceil(W / gx) + 1;
      const rows = Math.ceil(H / gy) + 1;
      for (let c = 0; c < cols; c++) {
        for (let r = 0; r < rows; r++) {
          if (Math.random() > 0.5) continue;
          nodes.push({
            x: c * gx + (Math.random()-0.5)*18,
            y: r * gy + (Math.random()-0.5)*18,
            a: Math.random()*0.35+0.1,
            r: Math.random()*1.4+0.4
          });
        }
      }
      edges = [];
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i+1; j < nodes.length; j++) {
          const dx = nodes[i].x-nodes[j].x, dy = nodes[i].y-nodes[j].y;
          const d = Math.hypot(dx,dy);
          if (d < 105 && (Math.abs(dx)<18 || Math.abs(dy)<18))
            edges.push([i,j]);
        }
      }
    }

    function frame() {
      ctx.clearRect(0,0,W,H);

      // Edges
      edges.forEach(([i,j]) => {
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = 'rgba(0,90,150,0.16)';
        ctx.lineWidth = 0.7;
        ctx.stroke();
      });

      // Pulses
      for (let k = pulses.length-1; k >= 0; k--) {
        const p = pulses[k];
        p.t += p.spd;
        if (p.t > 1) { pulses.splice(k,1); continue; }
        const a = nodes[edges[p.ei][0]], b = nodes[edges[p.ei][1]];
        const x = a.x+(b.x-a.x)*p.t, y = a.y+(b.y-a.y)*p.t;
        const g = ctx.createRadialGradient(x,y,0,x,y,9);
        g.addColorStop(0,'rgba(0,212,255,0.9)');
        g.addColorStop(0.4,'rgba(0,150,220,0.4)');
        g.addColorStop(1,'rgba(0,212,255,0)');
        ctx.beginPath(); ctx.arc(x,y,9,0,Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
      }

      // Nodes
      nodes.forEach(n => {
        const pulse = 0.5+0.5*Math.sin(t*0.018+n.x*0.04+n.y*0.02);
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r+pulse*0.7, 0, Math.PI*2);
        ctx.fillStyle = `rgba(0,212,255,${n.a*(0.6+0.4*pulse)})`;
        ctx.fill();
      });

      if (Math.random()<0.045 && edges.length) {
        const ei = Math.floor(Math.random()*edges.length);
        pulses.push({ ei, t:0, spd: 0.004+Math.random()*0.007 });
      }

      t++; requestAnimationFrame(frame);
    }

    resize();
    frame();
    window.addEventListener('resize', resize);
  </script>
</body>
</html>
